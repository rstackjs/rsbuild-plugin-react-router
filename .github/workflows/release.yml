name: Release

on:
  # Manually trigger the workflow
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run release from'
        required: true
        default: 'main'
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          # Checkout the branch specified in the trigger, or the head ref of the PR
          ref: ${{ github.event.inputs.branch || github.ref }}
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false

      - name: Setup npm for Trusted Publishing
        run: npm install -g npm@^11.5.1

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Project
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        with:
          # Run our custom release script that builds and publishes
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Display Release Information
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "🎉 Published packages to npm!"
          echo "Published packages: ${{ steps.changesets.outputs.publishedPackages }}"
