name: Benchmark

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compare full build and dev benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BENCHMARK_PROFILE: full
      BENCHMARK_BUILD_ITERATIONS: '10'
      BENCHMARK_MODE: dev
      BENCHMARK_ITERATIONS: '10'
      BENCHMARK_WARMUP: '0'
      BENCHMARK_DEV_ROUTES: auto
      BENCHMARK_HISTORY_BRANCH: benchmark-results
      SYNTHETIC_BENCHMARK_PROFILE: all
      SYNTHETIC_BENCHMARK_RUNS: '10'

    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout PR base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: head/.nvmrc
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: head/package.json

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-benchmark-pnpm-${{ hashFiles('head/pnpm-lock.yaml', 'base/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-benchmark-pnpm-
            ${{ runner.os }}-pnpm-store-

      - name: Install head dependencies
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Install base dependencies
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Resolve synthetic benchmark checkout
        id: synthetic-benchmark
        shell: bash
        run: |
          set -euo pipefail
          fixture="benchmarks/synthetic-web-bundler-benchmark"
          app_root=""
          tool_root=""

          for checkout in "$GITHUB_WORKSPACE/head" "$GITHUB_WORKSPACE/base"; do
            if [ -z "$app_root" ] && [ -f "$checkout/$fixture/package.json" ]; then
              app_root="$checkout/$fixture"
            fi

            if [ -z "$tool_root" ] && [ -f "$checkout/scripts/bench-synthetic-app.mjs" ]; then
              tool_root="$checkout"
            fi
          done

          if [ -z "$app_root" ] || [ -z "$tool_root" ]; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "SKIP=false" >> "$GITHUB_OUTPUT"
          echo "APP_ROOT=$app_root" >> "$GITHUB_OUTPUT"
          echo "TOOL_ROOT=$tool_root" >> "$GITHUB_OUTPUT"

      - name: Resolve benchmark-only React plugin
        id: benchmark-imports
        shell: bash
        run: |
          node -e "const { pathToFileURL } = require('node:url'); console.log('PLUGIN_REACT_IMPORT=' + pathToFileURL(process.argv[1]).href)" \
            "$GITHUB_WORKSPACE/head/node_modules/@rsbuild/plugin-react/dist/index.js" >> "$GITHUB_OUTPUT"

      - name: Benchmark base production build
        working-directory: base
        env:
          REACT_ROUTER_BENCHMARK_PLUGIN_REACT_IMPORT: ${{ steps.benchmark-imports.outputs.PLUGIN_REACT_IMPORT }}
        run: |
          node "$GITHUB_WORKSPACE/head/scripts/bench-builds.mjs" \
            --profile "$BENCHMARK_PROFILE" \
            --mode build \
            --iterations "$BENCHMARK_BUILD_ITERATIONS" \
            --warmup "$BENCHMARK_WARMUP" \
            --clean build \
            --format both \
            --out "$GITHUB_WORKSPACE/benchmark-output/build/base"

      - name: Benchmark head production build
        working-directory: head
        run: |
          node scripts/bench-builds.mjs \
            --profile "$BENCHMARK_PROFILE" \
            --mode build \
            --iterations "$BENCHMARK_BUILD_ITERATIONS" \
            --warmup "$BENCHMARK_WARMUP" \
            --clean build \
            --format both \
            --out "$GITHUB_WORKSPACE/benchmark-output/build/head"

      - name: Benchmark base dev
        working-directory: base
        env:
          REACT_ROUTER_BENCHMARK_PLUGIN_REACT_IMPORT: ${{ steps.benchmark-imports.outputs.PLUGIN_REACT_IMPORT }}
        run: |
          node "$GITHUB_WORKSPACE/head/scripts/bench-builds.mjs" \
            --profile "$BENCHMARK_PROFILE" \
            --mode "$BENCHMARK_MODE" \
            --iterations "$BENCHMARK_ITERATIONS" \
            --warmup "$BENCHMARK_WARMUP" \
            --dev-routes "$BENCHMARK_DEV_ROUTES" \
            --clean build \
            --format both \
            --out "$GITHUB_WORKSPACE/benchmark-output/dev/base"

      - name: Benchmark head dev
        working-directory: head
        run: |
          node scripts/bench-builds.mjs \
            --profile "$BENCHMARK_PROFILE" \
            --mode "$BENCHMARK_MODE" \
            --iterations "$BENCHMARK_ITERATIONS" \
            --warmup "$BENCHMARK_WARMUP" \
            --dev-routes "$BENCHMARK_DEV_ROUTES" \
            --clean build \
            --format both \
            --out "$GITHUB_WORKSPACE/benchmark-output/dev/head"

      - name: Benchmark embedded synthetic app with base plugin
        if: steps.synthetic-benchmark.outputs.SKIP == 'false'
        working-directory: ${{ steps.synthetic-benchmark.outputs.TOOL_ROOT }}
        run: |
          node scripts/bench-synthetic-app.mjs \
            --app "${{ steps.synthetic-benchmark.outputs.APP_ROOT }}" \
            --plugin-root "$GITHUB_WORKSPACE/base" \
            --skip-install \
            --out "$GITHUB_WORKSPACE/benchmark-output/synthetic/base" \
            --runs "$SYNTHETIC_BENCHMARK_RUNS" \
            --profile "$SYNTHETIC_BENCHMARK_PROFILE"

      - name: Benchmark embedded synthetic app with head plugin
        if: steps.synthetic-benchmark.outputs.SKIP == 'false'
        working-directory: ${{ steps.synthetic-benchmark.outputs.TOOL_ROOT }}
        run: |
          node scripts/bench-synthetic-app.mjs \
            --app "${{ steps.synthetic-benchmark.outputs.APP_ROOT }}" \
            --plugin-root "$GITHUB_WORKSPACE/head" \
            --skip-install \
            --out "$GITHUB_WORKSPACE/benchmark-output/synthetic/head" \
            --runs "$SYNTHETIC_BENCHMARK_RUNS" \
            --profile "$SYNTHETIC_BENCHMARK_PROFILE"

      - name: Generate benchmark report
        working-directory: head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node scripts/report-benchmark-ci.mjs \
            --base "$GITHUB_WORKSPACE/benchmark-output/dev/base/baseline.json" \
            --head "$GITHUB_WORKSPACE/benchmark-output/dev/head/baseline.json" \
            --build-base "$GITHUB_WORKSPACE/benchmark-output/build/base/baseline.json" \
            --build-head "$GITHUB_WORKSPACE/benchmark-output/build/head/baseline.json" \
            --out "$GITHUB_WORKSPACE/benchmark-output/report" \
            --pr "$PR_NUMBER" \
            --base-ref "$BASE_REF" \
            --base-sha "$BASE_SHA" \
            --head-ref "$HEAD_REF" \
            --head-sha "$HEAD_SHA" \
            --run-url "$RUN_URL" \
            $(if [ -f "$GITHUB_WORKSPACE/benchmark-output/synthetic/base/latest.json" ] && [ -f "$GITHUB_WORKSPACE/benchmark-output/synthetic/head/latest.json" ]; then
              printf '%s\n' \
                --synthetic-base "$GITHUB_WORKSPACE/benchmark-output/synthetic/base/latest.json" \
                --synthetic-head "$GITHUB_WORKSPACE/benchmark-output/synthetic/head/latest.json"
            fi)

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: benchmark-output
          if-no-files-found: error

      - name: Comment benchmark results
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          marker='<!-- react-router-benchmark-ci -->'
          comment_body="$GITHUB_WORKSPACE/benchmark-output/report/comment.md"
          body="$(cat "$comment_body")"
          comment_id="$(gh api "repos/$REPOSITORY/issues/$PR_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"

          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/$REPOSITORY/issues/comments/$comment_id" \
              --field body="$body"
          else
            gh api --method POST "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
              --field body="$body"
          fi

      - name: Persist benchmark history
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          history_dir="$GITHUB_WORKSPACE/benchmark-history"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"

          set +e
          git ls-remote --exit-code --heads "$remote_url" "$BENCHMARK_HISTORY_BRANCH" > /dev/null 2>&1
          branch_status=$?
          set -e

          if [ "$branch_status" -eq 0 ]; then
            git clone --depth 1 --branch "$BENCHMARK_HISTORY_BRANCH" "$remote_url" "$history_dir"
          elif [ "$branch_status" -eq 2 ]; then
            git clone --depth 1 "$remote_url" "$history_dir"
            cd "$history_dir"
            git checkout --orphan "$BENCHMARK_HISTORY_BRANCH"
            git rm -rf .
          else
            exit "$branch_status"
          fi

          cd "$history_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          result_dir="pull-requests/${PR_NUMBER}/${HEAD_SHA}"
          latest_dir="pull-requests/${PR_NUMBER}/latest"
          mkdir -p "$result_dir" "$latest_dir"
          cp "$GITHUB_WORKSPACE/benchmark-output/dev/base/baseline.json" "$result_dir/base.json"
          cp "$GITHUB_WORKSPACE/benchmark-output/dev/head/baseline.json" "$result_dir/head.json"
          cp "$GITHUB_WORKSPACE/benchmark-output/build/base/baseline.json" "$result_dir/build-base.json"
          cp "$GITHUB_WORKSPACE/benchmark-output/build/head/baseline.json" "$result_dir/build-head.json"
          if [ -d "$GITHUB_WORKSPACE/benchmark-output/synthetic" ]; then
            cp -R "$GITHUB_WORKSPACE/benchmark-output/synthetic" "$result_dir/synthetic"
          fi
          cp "$GITHUB_WORKSPACE/benchmark-output/report/report.json" "$result_dir/report.json"
          cp "$GITHUB_WORKSPACE/benchmark-output/report/comment.md" "$result_dir/comment.md"
          cp "$result_dir/report.json" "$latest_dir/report.json"
          cp "$result_dir/comment.md" "$latest_dir/comment.md"

          git add pull-requests
          if git diff --cached --quiet; then
            echo "Benchmark history is already up to date."
            exit 0
          fi

          git commit -m "bench: record PR ${PR_NUMBER} ${HEAD_SHA:0:7}"
          git push origin "$BENCHMARK_HISTORY_BRANCH"
