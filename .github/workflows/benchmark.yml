name: Benchmark

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compare local benchmark results
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout PR base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: head/.nvmrc
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: head/package.json

      - name: Install head dependencies
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Install base dependencies
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Build head plugin
        working-directory: head
        run: pnpm build

      - name: Build base plugin
        working-directory: base
        run: pnpm build

      - name: Run local benchmark comparisons
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if (( PR_NUMBER % 2 == 0 )); then
            order=(base head)
          else
            order=(head base)
          fi
          for side in "${order[@]}"; do
            node "$GITHUB_WORKSPACE/head/benchmarks/run.mts" \
              --plugin-root "$GITHUB_WORKSPACE/$side" \
              --out "$GITHUB_WORKSPACE/benchmark-output/$side.json"
          done

      - name: Compare benchmark results
        working-directory: head
        run: |
          node scripts/benchmark/compare.mts \
            --base "$GITHUB_WORKSPACE/benchmark-output/base.json" \
            --head "$GITHUB_WORKSPACE/benchmark-output/head.json" \
            --out "$GITHUB_WORKSPACE/benchmark-output/report"

      - name: Add benchmark report to job summary
        run: cat "$GITHUB_WORKSPACE/benchmark-output/report/comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-pr-${{ github.event.pull_request.number }}
          path: |
            benchmark-output/base.json
            benchmark-output/head.json
            benchmark-output/report/comment.md
          if-no-files-found: error

      - name: Comment benchmark results
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT_BODY="$(<"$GITHUB_WORKSPACE/benchmark-output/report/comment.md")" \
            node "$GITHUB_WORKSPACE/head/scripts/benchmark/comment.mts"

  codspeed:
    name: CodSpeed walltime
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Upload CodSpeed walltime result
        uses: CodSpeedHQ/action@v4
        continue-on-error: true
        with:
          mode: walltime
          run: pnpm bench:codspeed
