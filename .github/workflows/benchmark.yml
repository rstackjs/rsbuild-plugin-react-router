name: Benchmark

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-dev-benchmark:
    name: Benchmark build/dev (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: small
            label: small fixtures
            profile: ci-small
            build_order: base,head
            dev_order: head,base
          - shard: large
            label: large fixtures
            profile: ci-large
            build_order: head,base
            dev_order: base,head

    env:
      BENCHMARK_PROFILE: ${{ matrix.profile }}
      BENCHMARK_BUILD_ITERATIONS: '5'
      BENCHMARK_LARGE_ITERATIONS: '3'
      BENCHMARK_MODE: dev
      BENCHMARK_ITERATIONS: '5'
      BENCHMARK_WARMUP: '1'
      BENCHMARK_DEV_ROUTES: auto

    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout PR base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: head/.nvmrc
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: head/package.json

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-benchmark-pnpm-${{ hashFiles('head/pnpm-lock.yaml', 'base/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-benchmark-pnpm-
            ${{ runner.os }}-pnpm-store-

      - name: Install head dependencies
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Install base dependencies
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Resolve benchmark-only React plugin
        id: benchmark-imports
        shell: bash
        run: |
          node -e "const { pathToFileURL } = require('node:url'); console.log('PLUGIN_REACT_IMPORT=' + pathToFileURL(process.argv[1]).href)" \
            "$GITHUB_WORKSPACE/head/node_modules/@rsbuild/plugin-react/dist/index.js" >> "$GITHUB_OUTPUT"

      # Keep both sides on the same runner and counterbalance which side runs
      # first across shard/mode pairs. Timing artifacts are deliberately not
      # cached because a cached base cannot control for the current runner.
      - name: Benchmark production builds
        env:
          PLUGIN_REACT_IMPORT: ${{ steps.benchmark-imports.outputs.PLUGIN_REACT_IMPORT }}
          RUN_ORDER: ${{ matrix.build_order }}
        run: |
          set -euo pipefail
          run_benchmark() {
            local side="$1"
            (
              cd "$GITHUB_WORKSPACE/$side"
              if [ "$side" = base ]; then
                export REACT_ROUTER_BENCHMARK_PLUGIN_REACT_IMPORT="$PLUGIN_REACT_IMPORT"
              fi
              node "$GITHUB_WORKSPACE/head/scripts/bench-builds.mts" \
                --profile "$BENCHMARK_PROFILE" \
                --mode build \
                --iterations "$BENCHMARK_BUILD_ITERATIONS" \
                --large-iterations "$BENCHMARK_LARGE_ITERATIONS" \
                --warmup "$BENCHMARK_WARMUP" \
                --clean build \
                --format both \
                --log-performance \
                --out "$GITHUB_WORKSPACE/benchmark-output/${{ matrix.shard }}/build/$side"
            )
          }
          IFS=, read -r first second <<< "$RUN_ORDER"
          run_benchmark "$first"
          run_benchmark "$second"

      - name: Benchmark dev servers
        env:
          PLUGIN_REACT_IMPORT: ${{ steps.benchmark-imports.outputs.PLUGIN_REACT_IMPORT }}
          RUN_ORDER: ${{ matrix.dev_order }}
        run: |
          set -euo pipefail
          run_benchmark() {
            local side="$1"
            (
              cd "$GITHUB_WORKSPACE/$side"
              if [ "$side" = base ]; then
                export REACT_ROUTER_BENCHMARK_PLUGIN_REACT_IMPORT="$PLUGIN_REACT_IMPORT"
              fi
              node "$GITHUB_WORKSPACE/head/scripts/bench-builds.mts" \
                --profile "$BENCHMARK_PROFILE" \
                --mode "$BENCHMARK_MODE" \
                --iterations "$BENCHMARK_ITERATIONS" \
                --large-iterations "$BENCHMARK_LARGE_ITERATIONS" \
                --warmup "$BENCHMARK_WARMUP" \
                --dev-routes "$BENCHMARK_DEV_ROUTES" \
                --clean build \
                --format both \
                --log-performance \
                --out "$GITHUB_WORKSPACE/benchmark-output/${{ matrix.shard }}/dev/$side"
            )
          }
          IFS=, read -r first second <<< "$RUN_ORDER"
          run_benchmark "$first"
          run_benchmark "$second"

      - name: Upload benchmark shard
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-${{ matrix.shard }}-${{ github.event.pull_request.head.sha }}
          path: benchmark-output/${{ matrix.shard }}
          if-no-files-found: error

  synthetic-benchmark:
    name: Benchmark synthetic app
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      BENCHMARK_HISTORY_BRANCH: benchmark-results
      SYNTHETIC_BENCHMARK_PROFILE: all
      SYNTHETIC_BENCHMARK_RUNS: '3'

    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout PR base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: head/.nvmrc
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: head/package.json

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-benchmark-pnpm-${{ hashFiles('head/pnpm-lock.yaml', 'base/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-benchmark-pnpm-
            ${{ runner.os }}-pnpm-store-

      - name: Install head dependencies
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Install base dependencies
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Resolve synthetic benchmark checkout
        id: synthetic-benchmark
        run: node head/scripts/benchmark/ci-resolve-synthetic.mjs

      - name: Test benchmark scripts
        if: steps.synthetic-benchmark.outputs.SKIP == 'false'
        working-directory: head/benchmarks/synthetic-web-bundler-benchmark
        run: pnpm test:benchmark

      - name: Benchmark embedded synthetic app
        if: steps.synthetic-benchmark.outputs.SKIP == 'false'
        working-directory: ${{ steps.synthetic-benchmark.outputs.TOOL_ROOT }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          APP_ROOT: ${{ steps.synthetic-benchmark.outputs.APP_ROOT }}
        run: |
          set -euo pipefail
          run_benchmark() {
            local side="$1"
            node scripts/bench-synthetic-app.mjs \
              --app "$APP_ROOT" \
              --plugin-root "$GITHUB_WORKSPACE/$side" \
              --skip-install \
              --out "$GITHUB_WORKSPACE/benchmark-output/synthetic/$side" \
              --runs "$SYNTHETIC_BENCHMARK_RUNS" \
              --profile "$SYNTHETIC_BENCHMARK_PROFILE"
          }
          if (( PR_NUMBER % 2 == 0 )); then
            order=(base head)
          else
            order=(head base)
          fi
          run_benchmark "${order[0]}"
          run_benchmark "${order[1]}"

      - name: Ensure skipped synthetic artifact path exists
        if: steps.synthetic-benchmark.outputs.SKIP == 'true'
        run: |
          mkdir -p benchmark-output/synthetic
          touch benchmark-output/synthetic/SKIPPED

      - name: Upload synthetic benchmark shard
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-synthetic-${{ github.event.pull_request.head.sha }}
          path: benchmark-output/synthetic
          if-no-files-found: error

  benchmark:
    name: Compare full build and dev benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-dev-benchmark
      - synthetic-benchmark

    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          path: head
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: head/.nvmrc
          package-manager-cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: head/package.json

      - name: Install head runtime dependencies
        working-directory: head
        run: pnpm install --filter rsbuild-plugin-react-router --prod --frozen-lockfile

      - name: Download small benchmark shard
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: benchmark-small-${{ github.event.pull_request.head.sha }}
          path: benchmark-output/shards/small

      - name: Download large benchmark shard
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: benchmark-large-${{ github.event.pull_request.head.sha }}
          path: benchmark-output/shards/large

      - name: Download synthetic benchmark shard
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: benchmark-synthetic-${{ github.event.pull_request.head.sha }}
          path: benchmark-output/synthetic

      - name: Merge benchmark shards
        run: |
          node head/scripts/benchmark/ci-merge-results.mjs \
            --out "$GITHUB_WORKSPACE/benchmark-output/build/base/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/small/build/base/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/large/build/base/baseline.json"
          node head/scripts/benchmark/ci-merge-results.mjs \
            --out "$GITHUB_WORKSPACE/benchmark-output/build/head/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/small/build/head/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/large/build/head/baseline.json"
          node head/scripts/benchmark/ci-merge-results.mjs \
            --out "$GITHUB_WORKSPACE/benchmark-output/dev/base/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/small/dev/base/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/large/dev/base/baseline.json"
          node head/scripts/benchmark/ci-merge-results.mjs \
            --out "$GITHUB_WORKSPACE/benchmark-output/dev/head/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/small/dev/head/baseline.json" \
            "$GITHUB_WORKSPACE/benchmark-output/shards/large/dev/head/baseline.json"

      - name: Generate benchmark report
        working-directory: head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node scripts/report-benchmark-ci.mts \
            --base "$GITHUB_WORKSPACE/benchmark-output/dev/base/baseline.json" \
            --head "$GITHUB_WORKSPACE/benchmark-output/dev/head/baseline.json" \
            --build-base "$GITHUB_WORKSPACE/benchmark-output/build/base/baseline.json" \
            --build-head "$GITHUB_WORKSPACE/benchmark-output/build/head/baseline.json" \
            --out "$GITHUB_WORKSPACE/benchmark-output/report" \
            --pr "$PR_NUMBER" \
            --base-ref "$BASE_REF" \
            --base-sha "$BASE_SHA" \
            --head-ref "$HEAD_REF" \
            --head-sha "$HEAD_SHA" \
            --run-url "$RUN_URL" \
            $(if [ -f "$GITHUB_WORKSPACE/benchmark-output/synthetic/base/latest.json" ] && [ -f "$GITHUB_WORKSPACE/benchmark-output/synthetic/head/latest.json" ]; then
              printf '%s\n' \
                --synthetic-base "$GITHUB_WORKSPACE/benchmark-output/synthetic/base/latest.json" \
                --synthetic-head "$GITHUB_WORKSPACE/benchmark-output/synthetic/head/latest.json"
            fi)

      - name: Generate benchmark diagnostics
        working-directory: head
        run: |
          node scripts/benchmark/ci-diagnostics.mjs \
            --root "$GITHUB_WORKSPACE/benchmark-output" \
            --out "$GITHUB_WORKSPACE/benchmark-output/diagnostics"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: benchmark-output
          if-no-files-found: error

      - name: Comment benchmark results
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          COMMENT_BODY: ${{ github.workspace }}/benchmark-output/report/comment.md
        run: node head/scripts/benchmark/ci-comment-report.mjs

      - name: Persist benchmark history
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
        run: node head/scripts/benchmark/ci-persist-history.mjs
